<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulation – GREEN FUTURE</title>
    <meta name="description" content="EU sustainability regulation explained for Asian suppliers — by the GCC Sustainability Committee, German Chamber of Commerce Hong Kong.">
    <link rel="icon" type="image/png" href="assets/img/gcchk-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700;8..60,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .regpage {
            max-width: 820px;
            margin: 0 auto;
            padding: calc(var(--nav-height) + 48px) 24px 80px;
        }
        .regpage-back {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 28px;
        }
        .regpage-back:hover { text-decoration: underline; }
        .regpage .badge { margin-bottom: 14px; }
        .regpage h1 {
            font-family: var(--font-serif);
            font-size: clamp(1.9rem, 4vw, 2.7rem);
            line-height: 1.15;
            margin-bottom: 6px;
        }
        .regpage-ref {
            font-size: 1rem;
            color: var(--gray-600);
            margin-bottom: 28px;
        }
        .regpage-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 36px;
        }
        .regpage-meta-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 4px;
        }
        .regpage-meta-value { font-size: 0.92rem; font-weight: 600; line-height: 1.45; }
        .regpage-section { margin-bottom: 28px; }
        .regpage-section h2 {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            border-bottom: 2px solid var(--gray-200);
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .regpage-section p { font-size: 1rem; line-height: 1.7; }
        .regpage-ctas {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid var(--gray-200);
        }
        .regpage-loading, .regpage-error { text-align: center; padding: 80px 0; color: var(--gray-600); }
        @media (max-width: 640px) { .regpage-meta { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="nav scrolled" id="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/img/gcchk-logo.png" alt="GCC – German Chamber of Commerce Hong Kong">
                <span>GREEN FUTURE</span>
            </a>
            <div class="nav-right">
                <div class="lang-toggle">
                    <select id="langSelect" aria-label="Language / 语言 / Sprache / Ngôn ngữ">
                        <option value="en">EN</option>
                        <option value="zh">中文</option>
                        <option value="de">DE</option>
                        <option value="vi">VI</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main class="regpage" id="regpage">
        <div class="regpage-loading" id="regLoading"><span class="lang-en">Loading regulation&hellip;</span><span class="lang-zh">正在加载法规信息&hellip;</span><span class="lang-de">Verordnung wird geladen&hellip;</span><span class="lang-vi">Đang tải quy định&hellip;</span></div>
    </main>

    <script>
    (function () {
        var LANGS = ['en', 'zh', 'de', 'vi'];
        var currentLang = localStorage.getItem('gcc-lang') || 'en';
        if (LANGS.indexOf(currentLang) < 0) currentLang = 'en';
        function applyLang() {
            document.documentElement.lang = { en: 'en', zh: 'zh-Hans', de: 'de', vi: 'vi' }[currentLang];
            LANGS.forEach(function (l) { document.body.classList.toggle(l, l === currentLang && l !== 'en'); });
            var sel = document.getElementById('langSelect');
            if (sel) sel.value = currentLang;
        }
        var langSel = document.getElementById('langSelect');
        if (langSel) langSel.addEventListener('change', function () {
            currentLang = langSel.value;
            localStorage.setItem('gcc-lang', currentLang);
            applyLang();
        });
        applyLang();

        var sectionHeadersZh = {
            'REPORTING': '报告义务', 'SUPPLY CHAIN': '供应链要求', 'PRODUCT DESIGN': '产品设计',
            'DOCUMENTATION': '文件要求', 'PENALTIES': '违规处罚'
        };
        var sectionHeadersDe = {
            'REPORTING': 'Berichtspflichten', 'SUPPLY CHAIN': 'Lieferkette', 'PRODUCT DESIGN': 'Produktdesign',
            'DOCUMENTATION': 'Dokumentation', 'PENALTIES': 'Sanktionen'
        };
        var sectionHeadersVi = {
            'REPORTING': 'Nghĩa vụ báo cáo', 'SUPPLY CHAIN': 'Chuỗi cung ứng', 'PRODUCT DESIGN': 'Thiết kế sản phẩm',
            'DOCUMENTATION': 'Hồ sơ tài liệu', 'PENALTIES': 'Chế tài xử phạt'
        };
        var statusMeta = {
            inforce: { cls: 'badge-inforce', en: 'IN FORCE', zh: '已生效', de: 'IN KRAFT', vi: 'ĐÃ CÓ HIỆU LỰC' },
            phasing: { cls: 'badge-phasing', en: 'PHASING IN', zh: '逐步实施', de: 'SCHRITTWEISE EINFÜHRUNG', vi: 'ĐANG TRIỂN KHAI TỪNG BƯỚC' },
            prepare: { cls: 'badge-prepare', en: 'PREPARE NOW', zh: '立即准备', de: 'JETZT VORBEREITEN', vi: 'CHUẨN BỊ NGAY' }
        };

        var id = new URLSearchParams(location.search).get('id');
        var main = document.getElementById('regpage');

        function fail() {
            main.innerHTML = '<div class="regpage-error">' +
                '<p><span class="lang-en">Regulation not found or content unavailable.</span><span class="lang-zh">未找到该法规或内容暂不可用。</span><span class="lang-de">Verordnung nicht gefunden oder Inhalt nicht verfügbar.</span><span class="lang-vi">Không tìm thấy quy định hoặc nội dung hiện không khả dụng.</span></p>' +
                '<p style="margin-top:16px"><a class="regpage-back" href="index.html#compass"><span class="lang-en">&larr; Back to the Compass</span><span class="lang-zh">&larr; 返回指南针</span><span class="lang-de">&larr; Zurück zum Kompass</span><span class="lang-vi">&larr; Quay lại La bàn</span></a></p></div>';
            applyLang();
        }

        if (!id) { fail(); return; }

        fetch('/api/content?type=regulations')
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function (list) {
                var d = (list || []).find(function (x) { return x.regId === id; });
                if (!d) { fail(); return; }

                document.title = d.name + ' – GREEN FUTURE';
                var st = statusMeta[d.status] || { cls: '', en: d.status, zh: d.status, de: d.status, vi: d.status };
                var reviewed = d.lastReviewed
                    ? new Date(d.lastReviewed).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' })
                    : '';

                var sections = (d.sections || []).map(function (s) {
                    var zhTitle = sectionHeadersZh[s.title] || s.title;
                    var deTitle = sectionHeadersDe[s.title] || s.title;
                    var viTitle = sectionHeadersVi[s.title] || s.title;
                    var body = s.textZh
                        ? '<p><span class="lang-en">' + s.textEn + '</span><span class="lang-zh">' + s.textZh + '</span></p>'
                        : '<p>' + (s.textEn || '') + '</p>';
                    return '<div class="regpage-section">' +
                        '<h2><span class="lang-en">' + s.title + '</span><span class="lang-zh">' + zhTitle + '</span><span class="lang-de">' + deTitle + '</span><span class="lang-vi">' + viTitle + '</span></h2>' +
                        body + '</div>';
                }).join('');

                var overview = '';
                if (d.reasonEn) {
                    var en = d.reasonEn.replace('{category}', 'Affected products').replace('As {role}, ', '').replace('{role}', 'exporters');
                    var zh = (d.reasonZh || '').replace('{category}', '相关产品').replace('作为{role}，', '').replace('{role}', '出口商');
                    overview = '<div class="regpage-section">' +
                        '<h2><span class="lang-en">WHY IT MATTERS FOR SUPPLIERS</span><span class="lang-zh">对供应商的影响</span><span class="lang-de">WARUM ES FÜR LIEFERANTEN WICHTIG IST</span><span class="lang-vi">VÌ SAO ĐIỀU NÀY QUAN TRỌNG VỚI NHÀ CUNG CẤP</span></h2>' +
                        '<p><span class="lang-en">' + en + '</span><span class="lang-zh">' + (zh || en) + '</span></p></div>';
                }

                main.innerHTML =
                    '<a class="regpage-back" href="index.html#radar"><span class="lang-en">&larr; Back to overview</span><span class="lang-zh">&larr; 返回总览</span><span class="lang-de">&larr; Zurück zur Übersicht</span><span class="lang-vi">&larr; Quay lại tổng quan</span></a>' +
                    '<div><span class="badge ' + st.cls + '"><span class="lang-en">' + st.en + '</span><span class="lang-zh">' + st.zh + '</span><span class="lang-de">' + st.de + '</span><span class="lang-vi">' + st.vi + '</span></span></div>' +
                    '<h1>' + d.name + '</h1>' +
                    '<div class="regpage-ref">' + (d.ref || '') + '</div>' +
                    '<div class="regpage-meta">' +
                        '<div><div class="regpage-meta-label"><span class="lang-en">In force from</span><span class="lang-zh">生效日期</span><span class="lang-de">In Kraft seit</span><span class="lang-vi">Có hiệu lực từ</span></div><div class="regpage-meta-value">' + (d.inForce || '—') + '</div></div>' +
                        '<div><div class="regpage-meta-label"><span class="lang-en">Compliance deadline</span><span class="lang-zh">合规截止日期</span><span class="lang-de">Frist zur Einhaltung</span><span class="lang-vi">Thời hạn tuân thủ</span></div><div class="regpage-meta-value">' + (d.complianceDeadline || '—') + '</div></div>' +
                        '<div><div class="regpage-meta-label"><span class="lang-en">Last reviewed</span><span class="lang-zh">最近更新</span><span class="lang-de">Zuletzt geprüft</span><span class="lang-vi">Cập nhật gần nhất</span></div><div class="regpage-meta-value">' + reviewed + '</div></div>' +
                    '</div>' +
                    overview + sections +
                    '<div class="regpage-ctas">' +
                        (d.eurlex ? '<a href="' + d.eurlex + '" target="_blank" rel="noopener" class="btn btn-atlas" style="width:auto"><span class="lang-en">Read the official text</span><span class="lang-zh">查阅官方原文</span><span class="lang-de">Offiziellen Rechtstext lesen</span><span class="lang-vi">Đọc văn bản chính thức</span></a>' : '') +
                        '<a href="index.html#footer" class="btn btn-outline"><span class="lang-en">Get the weekly briefing</span><span class="lang-zh">订阅每周简报</span><span class="lang-de">Wöchentliches Briefing erhalten</span><span class="lang-vi">Nhận bản tin hàng tuần</span></a>' +
                        '<a href="mailto:gcc-sustainability@hongkong.ahk.de" class="btn btn-outline"><span class="lang-en">Ask the Committee</span><span class="lang-zh">咨询委员会</span><span class="lang-de">Den Ausschuss fragen</span><span class="lang-vi">Liên hệ Ủy ban</span></a>' +
                    '</div>';
                applyLang();
            })
            .catch(fail);
    })();
    </script>
</body>
</html>
